<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MindScope 90 hero banner</title>
  <desc id="desc">A dark premium hero banner for a mental health self-assessment platform.</desc>
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1f4cff" stop-opacity="0.45"/>
      <stop offset="45%" stop-color="#7c3aed" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="320" y1="120" x2="1290" y2="310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="0.38" stop-color="#A78BFA"/>
      <stop offset="0.72" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#F0FDFA"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity="0.05"/>
      <stop offset="0.48" stop-color="#A78BFA" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.12 0 0 0 0 0.74 0 0 0 0 0.95 0 0 0 0.8 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#94A3B8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="520" fill="#020617"/>
  <rect width="1600" height="520" fill="url(#g1)"/>
  <rect width="1600" height="520" fill="url(#grid)" opacity="0.7"/>
  <path d="M-100 420C170 320 315 580 610 455C923 323 1041 201 1320 254C1493 287 1610 220 1700 155" stroke="url(#strokeGrad)" stroke-width="3" opacity="0.8"/>
  <path d="M-50 118C165 184 298 32 520 108C804 205 922 384 1225 346C1400 324 1518 395 1650 451" stroke="url(#strokeGrad)" stroke-width="2" opacity="0.55"/>

  <!-- Left glass analytics card -->
  <g filter="url(#softShadow)">
    <rect x="86" y="84" width="285" height="322" rx="34" fill="#0F172A" fill-opacity="0.64" stroke="#67E8F9" stroke-opacity="0.24"/>
    <circle cx="226" cy="206" r="84" fill="#020617" fill-opacity="0.52" stroke="#22D3EE" stroke-opacity="0.45" stroke-width="2"/>
    <path d="M226 121V206L287 264" stroke="#67E8F9" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M158 260C189 291 257 304 306 242" stroke="#A78BFA" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <path d="M168 181C191 144 251 132 291 164" stroke="#22D3EE" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <rect x="132" y="333" width="188" height="20" rx="10" fill="#1E293B"/>
    <rect x="132" y="333" width="137" height="20" rx="10" fill="#22D3EE" opacity="0.85"/>
    <text x="226" y="376" text-anchor="middle" fill="#CBD5E1" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Radar Insight</text>
  </g>

  <!-- Main title -->
  <text x="460" y="178" fill="url(#titleGrad)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="112" font-weight="900" letter-spacing="-4">MindScope 90</text>
  <text x="464" y="238" fill="#E2E8F0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="38" font-weight="700" letter-spacing="0.2">Smart Mental Health Self-Assessment Platform</text>
  <text x="466" y="288" fill="#A5F3FC" font-family="Microsoft YaHei, PingFang SC, Inter, Arial, sans-serif" font-size="28" font-weight="650">心理健康自评平台 · PDF Reports · Analytics · Local-first Privacy</text>

  <!-- Badges -->
  <g font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="800">
    <rect x="464" y="333" width="120" height="44" rx="22" fill="#0F172A" fill-opacity="0.78" stroke="#67E8F9" stroke-opacity="0.45"/>
    <text x="524" y="362" text-anchor="middle" fill="#E0F2FE">EN</text>
    <rect x="598" y="333" width="136" height="44" rx="22" fill="#0F172A" fill-opacity="0.78" stroke="#A78BFA" stroke-opacity="0.5"/>
    <text x="666" y="362" text-anchor="middle" fill="#F5F3FF">中文</text>
    <rect x="752" y="333" width="210" height="44" rx="22" fill="#0F172A" fill-opacity="0.78" stroke="#22D3EE" stroke-opacity="0.4"/>
    <text x="857" y="362" text-anchor="middle" fill="#E0F2FE">PDF Export</text>
    <rect x="982" y="333" width="220" height="44" rx="22" fill="#0F172A" fill-opacity="0.78" stroke="#A78BFA" stroke-opacity="0.45"/>
    <text x="1092" y="362" text-anchor="middle" fill="#F5F3FF">No Backend</text>
  </g>

  <!-- Right export cards -->
  <g filter="url(#softShadow)">
    <rect x="1268" y="100" width="230" height="88" rx="24" fill="#0F172A" fill-opacity="0.65" stroke="#A78BFA" stroke-opacity="0.38"/>
    <text x="1300" y="136" fill="#E2E8F0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="800">Report Engine</text>
    <text x="1300" y="165" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">PDF · PNG · CSV · JSON</text>
    <rect x="1215" y="224" width="282" height="120" rx="28" fill="#0F172A" fill-opacity="0.65" stroke="#67E8F9" stroke-opacity="0.32"/>
    <text x="1250" y="266" fill="#E2E8F0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">Dimension Details</text>
    <text x="1250" y="298" fill="#94A3B8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Meaning · Signs · Advice</text>
    <circle cx="1444" cy="284" r="28" fill="#22D3EE" fill-opacity="0.18" stroke="#67E8F9"/>
    <path d="M1433 284H1455M1444 273V295" stroke="#A5F3FC" stroke-width="4" stroke-linecap="round"/>
  </g>

  <text x="800" y="470" text-anchor="middle" fill="#64748B" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="600">A polished static web assessment experience for secure, local-first, client-side report generation.</text>
</svg>
